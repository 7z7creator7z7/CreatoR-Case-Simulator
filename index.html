<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CreatoR BullDrop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="user-info" onclick="showSection('profile')">
                <img id="user-photo" src="https://img.icons8.com/bubbles/100/000000/user.png">
                <span id="user-name">『CreatoR』</span>
            </div>
            <div class="balance-display">
                <img src="https://img.icons8.com/color/48/000000/coins.png" width="20">
                <span id="balance">100.00</span> $
            </div>
        </header>

        <main id="content">
            <section id="home-section" class="content-active">
                <div class="category-title"><h2>Nodirliklar</h2></div>
                <div class="case-grid" id="case-list"></div>
            </section>

            <section id="games-section" class="hidden">
                <div class="game-nav">
                    <button onclick="switchGame('crash')">🚀 Crash</button>
                    <button onclick="switchGame('mines')">💣 Mines</button>
                    <button onclick="switchGame('plinko')">🟢 Plinko</button>
                    <button onclick="switchGame('battle')">⚔️ Kontakt</button>
                </div>
                <div id="game-area"></div>
            </section>

            <section id="inventory-section" class="hidden">
                <h2>Mening Inventarim</h2>
                <div id="inv-list" class="items-grid"></div>
            </section>

            <section id="profile-section" class="hidden">
                <div class="profile-card">
                    <h3 id="user-display">『CreatoR』</h3>
                    <div class="lang-select">
                        <p>Tilni tanlang / Select Language:</p>
                        <button onclick="changeLang('uz')">🇺🇿 O'zbekcha</button>
                        <button onclick="changeLang('en')">🇺🇸 English</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-navbar">
            <div class="nav-btn active" id="nav-home" onclick="showSection('home')">
                <span class="material-icons-outlined">home</span><p>Bosh sahifa</p>
            </div>
            <div class="nav-btn" id="nav-games" onclick="showSection('games')">
                <span class="material-icons-outlined">sports_esports</span><p>O'yinlar</p>
            </div>
            <div class="nav-btn" id="nav-inventory" onclick="showSection('inventory')">
                <span class="material-icons-outlined">inventory_2</span><p>Inventar</p>
            </div>
            <div class="nav-btn" id="nav-profile" onclick="showSection('profile')">
                <span class="material-icons-outlined">person</span><p>Profil</p>
            </div>
        </nav>
    </div>

    <div id="case-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="m-title">Keys</h2>
            <div id="roulette-container">
                <div id="selector"></div>
                <div id="roulette-inner"></div>
            </div>
            <button id="open-btn" class="buy-btn">OCHISH</button>
            <button onclick="closeModal()" class="close-btn-text">Yopish</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
