<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatoR BullDrop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header onclick="showSection('profile')">
            <div class="user-info">
                <div class="avatar-container">
                    <img id="user-photo" src="https://img.icons8.com/bubbles/100/000000/user.png" alt="Avatar">
                </div>
                <span id="user-name">『CreatoR』</span>
            </div>
            <div class="balance-info">💰 <span id="balance">100.00</span> $</div>
        </header>

        <main>
            <section id="cases-section">
                <div class="case-grid" id="case-list"></div>
            </section>

            <section id="games-section" class="hidden">
                <div class="game-selector">
                    <button onclick="openMiniGame('crash')">🚀 Crash</button>
                    <button onclick="openMiniGame('mines')">💣 Mines</button>
                    <button onclick="openMiniGame('upgrade')">⚡ Upgrade</button>
                </div>
                <div id="minigame-content"></div>
            </section>

            <section id="profile-section" class="hidden">
                <div class="profile-tabs">
                    <button onclick="showTab('inv')">🎒</button>
                    <button onclick="showTab('top')">🏆</button>
                    <button onclick="showTab('promo')">🎁</button>
                </div>
                <div id="tab-content"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="showSection('cases')">🏠<span>Asosiy</span></div>
            <div class="nav-item" onclick="showSection('games')">🎮<span>O'yinlar</span></div>
            <div class="nav-item" onclick="showSection('profile')">👤<span>Profil</span></div>
        </nav>

        <div id="case-modal" class="hidden">
            <div class="modal-content">
                <div class="roller-container">
                    <div id="roller-line"></div>
                    <div id="roller-items"></div>
                </div>
                <button id="close-modal" class="hidden" onclick="closeModal()">Yopish</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
