<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Creator Case</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP PROFILE -->

<div class="top">

    <div class="profile">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        class="avatar">

        <div>

            <div class="nick">
                『CreatoR』
            </div>

            <div class="money"
            id="money">
                350000$
            </div>

        </div>

    </div>

</div>

<!-- MENU -->

<div class="menu">

    <button onclick="openCases()">
        Keyslar
    </button>

    <button onclick="openInventory()">
        Inventar
    </button>

    <button onclick="openProfile()">
        Profil
    </button>

</div>

<!-- CASE PAGE -->

<div id="casePage">

<h1 class="title">
    Keys Tanlang
</h1>

<div class="cases">

<!-- STANDARD -->

<div class="case">

<div class="case-image blue">
📦
</div>

<div class="case-info">

<div class="case-name">
Standard
</div>

<div class="case-price">
10$
</div>

<div class="chance">

<div class="c1">🔵 60%</div>
<div class="c2">🟢 30%</div>
<div class="c3">🟣 7%</div>
<div class="c4">🟡 3%</div>

</div>

<button class="open"
onclick="openCase(10)">
🔓 Ochish
</button>

</div>
</div>

<!-- ELITE -->

<div class="case">

<div class="case-image cyan">
💎
</div>

<div class="case-info">

<div class="case-name">
Elite
</div>

<div class="case-price">
100$
</div>

<div class="chance">

<div class="c1">🔵 30%</div>
<div class="c2">🟢 50%</div>
<div class="c3">🟣 17%</div>
<div class="c4">🟡 3%</div>

</div>

<button class="open"
onclick="openCase(100)">
🔓 Ochish
</button>

</div>
</div>

<!-- LUCKY -->

<div class="case">

<div class="case-image green">
🍀
</div>

<div class="case-info">

<div class="case-name">
Lucky
</div>

<div class="case-price">
500$
</div>

<div class="chance">

<div class="c1">🔵 10%</div>
<div class="c2">🟢 50%</div>
<div class="c3">🟣 30%</div>
<div class="c4">🟡 10%</div>

</div>

<button class="open"
onclick="openCase(500)">
🔓 Ochish
</button>

</div>
</div>

<!-- LEGEND -->

<div class="case">

<div class="case-image red">
🔥
</div>

<div class="case-info">

<div class="case-name">
Legendary
</div>

<div class="case-price">
1250$
</div>

<div class="chance">

<div class="c1">🔵 5%</div>
<div class="c2">🟢 20%</div>
<div class="c3">🟣 60%</div>
<div class="c4">🟡 15%</div>

</div>

<button class="open"
onclick="openCase(1250)">
🔓 Ochish
</button>

</div>
</div>

</div>

</div>

<!-- INVENTORY -->

<div id="inventoryPage">

<h1 class="title">
🎒 Inventar
</h1>

<div id="inventory">

</div>

</div>

<!-- MODAL -->

<div class="modal"
id="modal">

<div class="modal-box">

<h2>
Case Ochilmoqda...
</h2>

<div class="roulette">

<div class="line"></div>

<div class="track"
id="track">

</div>

</div>

<div class="winner"
id="winner">

</div>

<button class="sell"
id="sellBtn">
💰 Sotish
</button>

<button class="close"
onclick="closeModal()">
❌ Yopish
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
<div class="profile-box">

   <h2>Profil</h2>

   <div class="lang-box">
      <button onclick="setLanguage('uz')">UZB</button>
      <button onclick="setLanguage('en')">ENG</button>
   </div>

   <div class="promo-box">
      <input type="text" id="promoInput" placeholder="PROMOCODE">

      <button onclick="usePromo()">
         Ishlatish
      </button>
   </div>

   <button class="daily-btn" onclick="claimDaily()">
      Daily Reward
   </button>

    </div>
