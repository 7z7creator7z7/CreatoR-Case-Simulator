<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CreatoR Drop</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header>
      <div class="user-info" onclick="openProfile()">
        <img id="user-photo" src="https://img.icons8.com/bubbles/100/000000/user.png">
        <span id="user-name">『CreatoR』</span>
      </div>
      <div class="balance-display">
        💰 <span id="balance">100.00</span> $
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="content">
      <!-- CASES SECTION -->
      <section id="cases-section">
        <div class="category-title">
          <span class="material-icons-outlined gold">workspace_premium</span>
          <h2>Keyslar</h2>
        </div>
        <div class="case-grid" id="case-list"></div>
      </section>

      <!-- GAMES SECTION -->
      <section id="games-section" class="hidden">
        <div class="game-nav">
          <button onclick="switchGame('crash')" class="game-btn-tab active">🚀 Crash</button>
          <button onclick="switchGame('mines')" class="game-btn-tab">💣 Mines</button>
          <button onclick="switchGame('upgrade')" class="game-btn-tab">⚡ Upgrade</button>
          <button onclick="switchGame('plinko')" class="game-btn-tab">🎯 Plinko</button>
          <button onclick="switchGame('kontakt')" class="game-btn-tab">🎡 Kontakt</button>
        </div>
        <div id="game-area"></div>
      </section>

      <!-- PROFILE SECTION -->
      <section id="profile-section" class="hidden">
        <h2>Profil</h2>
        <div class="profile-info">
          <img id="profile-photo" src="https://img.icons8.com/bubbles/100/000000/user.png">
          <p id="profile-name">『CreatoR』</p>
        </div>
        <div class="profile-menu">
          <button onclick="openInventory()">📦 Inventar</button>
          <button onclick="openPromo()">🎁 Promo Kod</button>
          <button onclick="openReferral()">👥 Takliflar</button>
          <button onclick="openBonus()">📅 7 Day Bonus</button>
          <button onclick="changeLanguage()">🌐 Til Tanlash</button>
        </div>
      </section>

      <!-- CHAT SECTION -->
      <section id="chat-section" class="hidden">
        <h2>Global Chat</h2>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Xabar yozing...">
        <button onclick="sendMessage()">Yuborish</button>
      </section>
    </main>

    <!-- NAVBAR -->
    <nav class="bottom-navbar">
      <div class="nav-btn active" id="nav-cases" onclick="showSection('cases')">
        <span class="material-icons-outlined">inventory_2</span><p>Keyslar</p>
      </div>
      <div class="nav-btn" id="nav-games" onclick="showSection('games')">
        <span class="material-icons-outlined">sports_esports</span><p>O'yinlar</p>
      </div>
      <div class="nav-btn" id="nav-profile" onclick="showSection('profile')">
        <span class="material-icons-outlined">account_circle</span><p>Profil</p>
      </div>
      <div class="nav-btn" id="nav-chat" onclick="showSection('chat')">
        <span class="material-icons-outlined">chat_bubble_outline</span><p>Chat</p>
      </div>
    </nav>
  </div>

  <!-- PROMO MODAL -->
  <div id="promo-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Promo Kod</h3>
      <input type="text" id="promo-input" placeholder="Kodni yozing...">
      <button onclick="applyPromo()">Faollashtirish</button>
      <button onclick="closePromo()">Yopish</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
<div class="crash-container">
  <h3>⚡ Crash O'yini</h3>
  <button onclick="startCrashGame()">Boshlash</button>
  <div class="crash-progress">
    <div class="crash-bar"></div>
  </div>
  <p id="crash-result"></p>
</div>
<!-- 💣 Mines O'yini -->
<div class="mines-container">
  <h3>💣 Mines O'yini</h3>
  <button onclick="startMinesGame()">Boshlash</button>
  <div id="mines-grid" class="grid"></div>
  <p id="mines-result"></p>
</div>
