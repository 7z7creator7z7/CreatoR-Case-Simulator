<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>MC Bulldrop Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>MC Case O‘yin 🎁</h1>
  <div class="balance">💰 Balans: <span id="balance">100</span> MC</div>

  <!-- Case Section -->
  <div class="case-list">
    <button onclick="openCase(10)">Case 10 MC</button>
    <button onclick="openCase(50)">Case 50 MC</button>
    <button onclick="openCase(75)">Case 75 MC</button>
    <button onclick="openCase(100)">Case 100 MC</button>
    <button onclick="openCase(150)">Case 150 MC</button>
    <button onclick="openCase(250)">Case 250 MC</button>
    <button onclick="openCase(500)">Case 500 MC</button>
    <button onclick="openCase(750)">Case 750 MC</button>
    <button onclick="openCase(1000)">Case 1000 MC</button>
    <button onclick="openCase(1500)">Case 1500 MC</button>
  </div>

  <div id="caseResult"></div>
  <div class="inventory" id="inventory"><h3>Inventar 📦</h3></div>

  <!-- Upgrade Section -->
  <div id="upgradeSection">
    <h3>Upgrade 🎯</h3>
    <div>
      <label>Inventardan item tanlang:</label>
      <select id="upgradeItem"></select>
    </div>
    <div>
      <label>Target qiymat (MC):</label>
      <input type="number" id="targetValue" value="500">
    </div>
    <button onclick="doUpgrade()">Upgrade qilish</button>
    <div id="upgradeResult"></div>
  </div>

  <!-- Crash Section -->
  <div id="crashGame">
    <h3>Crash 🎢</h3>
    <div>
      <label>Summani kiriting (MC):</label>
      <input type="number" id="betAmount" value="10">
      <button onclick="placeBet()">Tikish</button>
    </div>
    <div id="crashStatus"></div>
    <div id="multiplier">×1.00</div>
    <button id="cashoutBtn" onclick="cashOut()" disabled>Cashout</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
