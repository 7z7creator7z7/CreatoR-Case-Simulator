<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user-name</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">

    <header>
        <div class="user-info" onclick="showSection('profile')">
            <img id="user-photo" src="https://via.placeholder.com/40" alt="Avatar">
            <span id="user-name">Yuklanmoqda...</span>
        </div>

        <div class="header-right">
            <div class="balance">
                <span id="balance">100</span>
                <img src="./images/mc1.png" alt="" class="currency-icon">
            </div>
            <div class="uc-box">
                ( <img src="./images/uc.png" alt="UC" class="uc-icon"> <span id="calculated-uc">0,00</span> UC )
            </div>
        </div>
    </header>

    <nav>
        <button onclick="showSection('cases')" id="nav-cases">🎁 Keyslar</button>
        <button onclick="showSection('inventory')" id="nav-inv">🎒 Inventar</button>
        <button onclick="showSection('profile')" id="nav-profile">👤 Profil</button>
    </nav>

    <section id="cases-section">
        <div id="case-list"></div>
    </section>

    <section id="inventory-section" class="hidden">
        <h2 id="title-inv">🎒 Mening Inventarim</h2>
        <div id="inventory-list"></div>
    </section>

    <section id="profile-section" class="hidden">
        <h2 id="title-profile">👤 Profil</h2>
        <div class="profile-card">
            <p id="label-lang">🇺🇿 Tilni tanlang:</p>
            <div class="lang-buttons">
                <button onclick="changeLanguage('uz')">🇺🇿 O'zbekcha</button>
                <button onclick="changeLanguage('en')">🇺🇸 English</button>
            </div>
            <div class="sound-setting">
                <span>🔊 Ovoz</span>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="promo-box">
            <h3>🎁 Promo Code</h3>
            <input type="text" id="promo-input" placeholder="Promo code...">
            <button onclick="usePromoCode()">✅ Activate</button>
        </div>
        <p id="label-stats">📊 Statistika tez kunda...</p>
    </section>

    <div id="game-modal" class="hidden">
        <div class="modal-content">
            <h3 id="opening-text">⌛ Ochilmoqda...</h3>
            <div id="case-window">
                <div id="line"></div>
                <div id="carousel"></div>
            </div>
            <button id="close-modal" class="close-btn hidden" onclick="closeModal()">Yopish</button>
        </div>
    </div>
<!-- CASE PREVIEW MODAL -->
<div id="case-preview-modal" class="case-preview-modal hidden">

    <!-- BACK BUTTON -->
    <div class="preview-header">
        <button onclick="closeCasePreview()" class="back-btn">
            ←
        </button>
    </div>

    <!-- CASE INFO -->
    <div class="case-preview-top">

        <img
            id="preview-case-img"
            src=""
            class="preview-case-image"
        >

        <div
            id="preview-case-name"
            class="case-title"
        ></div>

        <div
            id="preview-case-price"
            class="case-price"
        ></div>

        <button
            id="preview-open-btn"
            class="open-btn"
        >
            <img
                src="./images/mc.png"
                class="open-icon"
            >

            <span>Ochish</span>
        </button>

    </div>

    <!-- TITLE -->
    <div class="case-items-title">
        ----------- CASE TARKIBI -----------
    </div>

    <!-- SKINS -->
    <div
        id="preview-skins"
        class="case-grid"
    ></div>

</div>
<button class="open-btn" onclick="openCaseById('telegram')">Ochish</button>

</div>

<script src="script.js"></script>
</body>
</html>
