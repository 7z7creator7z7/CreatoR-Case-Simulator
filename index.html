<!-- INDEX.HTML 1-QISM -->

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CreatoR Case</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="top-profile">

    <div class="profile-left">
        <div class="avatar">
            💎
        </div>

        <div class="nickname">
            『CreatoR』
        </div>
    </div>

    <div class="money">
        💰 <span id="balance">350550</span>$
    </div>

</div>

<div class="menu">

    <button onclick="showPage('cases')">
        Keyslar
    </button>

    <button onclick="showPage('inventory')">
        Inventar
    </button>

    <button onclick="showPage('profile')">
        Profil
    </button>

</div>

<!-- CASE PAGE -->

<div id="casesPage">

<h1 class="title">
    Keys Tanlang
</h1>

<div class="cases-grid">

    <!-- STANDARD -->

    <div class="case-card">

        <div class="case-image standard-img">
            📦
        </div>

        <div class="case-info">

            <h3>Standard</h3>

            <p>10$</p>

            <div class="chance-box">
                🔵60% 🟢30% 🟣7% 🟡3%
            </div>

            <button onclick="openCase('standard')">
                🔓 Ochish
            </button>

        </div>

    </div>

    <!-- ELITE -->

    <div class="case-card">

        <div class="case-image elite-img">
            💎
        </div>

        <div class="case-info">

            <h3>Elite</h3>

            <p>100$</p>

            <div class="chance-box">
                🔵30% 🟢50% 🟣17% 🟡3%
            </div>

            <button onclick="openCase('elite')">
                🔓 Ochish
            </button>

        </div>

    </div>

    <!-- LUCKY -->

    <div class="case-card">

        <div class="case-image lucky-img">
            🍀
        </div>

        <div class="case-info">

            <h3>Lucky</h3>

            <p>500$</p>

            <div class="chance-box">
                🟢55% 🟣30% 🟡9% 🔴6%
            </div>

            <button onclick="openCase('lucky')">
                🔓 Ochish
            </button>

        </div>

    </div>

    <!-- LEGENDARY -->

    <div class="case-card">

        <div class="case-image legendary-img">
            🔥
        </div>

        <div class="case-info">

            <h3>Legendary</h3>

            <p>1250$</p>

            <div class="chance-box">
                🟣45% 🟡40% 🔴15%
            </div>

            <button onclick="openCase('legendary')">
                🔓 Ochish
            </button>

        </div>

    </div>

</div>

</div>

<!-- INVENTORY -->

<div id="inventoryPage" style="display:none;">

<h1 class="title">
    Inventar
</h1>

<div id="inventoryItems" class="inventory-grid">

</div>

</div>

<!-- PROFILE -->

<div id="profilePage" style="display:none;">

<h1 class="title">
    Profil
</h1>

<div class="profile-box">

    <h2>『CreatoR』</h2>

    <p>Balans:
        <span id="profileBalance">
            350550
        </span>$
    </p>

    <p>
        Ochilgan Keyslar:
        <span id="openedCases">
            0
        </span>
    </p>

</div>

</div>

<!-- OPEN EFFECT -->

<div id="openModal" class="modal">

    <div class="modal-content">

        <h2>
            Case Ochilmoqda...
        </h2>

        <div class="roulette-wrapper">

            <div id="roulette">

            </div>

            <div class="selector-line">

            </div>

        </div>

        <div id="wonItem">

        </div>

        <button onclick="closeModal()">
            Yopish
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html><!-- INDEX.HTML 2-QISM -->

<!-- OVOZLAR -->

<audio id="openSound">

<source
src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"
type="audio/mpeg">

</audio>

<audio id="clickSound">

<source
src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
type="audio/mpeg">

</audio>

<!-- TELEGRAM WEB APP -->

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>

const tg =
window.Telegram.WebApp;

tg.expand();

/* CLICK EFFECT */

document.querySelectorAll(
"button"
).forEach(btn=>{

btn.addEventListener(
"click",
()=>{

document.getElementById(
"clickSound"
).play();

}
);

});

</script>

<!-- SCRIPT -->

<script src="script.js"></script>

</body>
</html>
