<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Case Simulator</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="app">

    <!-- HEADER -->
    <header>

        <div class="user-info">

            <img
            id="user-photo"
            src="https://i.imgur.com/6VBx3io.png">

            <span id="user-name">
                Player
            </span>

        </div>

        <div class="balance-info">
            💰
            <span id="balance">0</span>$
        </div>

    </header>

    <!-- NAVIGATION -->
    <nav>

        <button onclick="showSection('cases')">
            Keyslar
        </button>

        <button onclick="showSection('inventory')">
            Inventar
        </button>

        <button onclick="showSection('profile')">
            Profil
        </button>

    </nav>

    <!-- CASES -->
    <section id="cases-section">

        <h2>
            Keys Tanlang
        </h2>

        <div
        class="case-grid"
        id="case-list">
        </div>

    </section>

    <!-- INVENTORY -->
    <section
    id="inventory-section"
    class="hidden">

        <h2>
            Inventar
        </h2>

        <div id="inventory-list">
        </div>

    </section>

    <!-- PROFILE -->
    <section
    id="profile-section"
    class="hidden">

        <h2>
            Profil
        </h2>

        <div class="profile-card">

            <p>
                Creator Case Simulator
            </p>

            <p>
                Telegram Mini App
            </p>

        </div>

    </section>

</div>

<!-- CASE OPEN MODAL -->
<div
id="game-modal"
class="hidden">

    <h2>
        Case Ochilmoqda...
    </h2>

    <div id="case-window">

        <div id="line"></div>

        <div id="carousel"></div>

    </div>

    <button
    class="close-btn"
    onclick="closeModal()">
        Yopish
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
